<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据文件上传 - 支持文件夹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .section-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: "📊";
        }
        
        /* 上传区域样式 */
        .upload-zone {
            border: 2px dashed #6b7fd7;
            border-radius: 12px;
            background: #f0f3ff;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-zone:hover {
            background: #e8ecff;
            border-color: #5a6ec7;
        }
        
        .upload-zone.dragover {
            background: #dde2ff;
            border-color: #4a5eb7;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .upload-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            font-size: 13px;
            color: #888;
        }
        
        /* 隐藏的文件输入 */
        .file-input {
            display: none;
        }
        
        /* 按钮 */
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #6b7fd7;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6ec7;
        }
        
        .btn-secondary {
            background: white;
            color: #6b7fd7;
            border: 1px solid #6b7fd7;
        }
        
        .btn-secondary:hover {
            background: #f0f3ff;
        }
        
        /* 文件列表 */
        .file-list {
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .file-list-header {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 13px;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .file-icon {
            margin-right: 10px;
        }
        
        .file-name {
            flex: 1;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .file-size {
            color: #888;
            margin-left: 10px;
        }
        
        /* 进度条 */
        .progress-area {
            margin-top: 20px;
            padding: 16px;
            background: white;
            border-radius: 8px;
        }
        
        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #6b7fd7;
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }
        
        /* 状态 */
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
        }
        
        .status-info {
            background: #f0f3ff;
            color: #6b7fd7;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section-title">数据文件</div>
        
        <!-- 上传区域 -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击选择数据文件或文件夹</div>
            <div class="upload-hint">
                支持拖拽上传 | 支持 .ogg .wav .mp3 .flac .ipynb 格式
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="selectFolder()">
                    📂 选择文件夹
                </button>
                <button class="btn btn-secondary" onclick="selectFiles()">
                    📄 选择文件
                </button>
            </div>
        </div>
        
        <!-- 关键：文件夹输入要有 webkitdirectory 和 directory 属性 -->
        <input type="file" id="folderInput" class="file-input" 
               webkitdirectory directory multiple>
        
        <input type="file" id="fileInput" class="file-input" 
               multiple accept=".ogg,.wav,.mp3,.flac,.m4a,.ipynb">
        
        <!-- 文件列表 -->
        <div class="file-list hidden" id="fileListArea">
            <div class="file-list-header">
                已选择 <span id="fileCount">0</span> 个文件
                (共 <span id="totalSize">0 MB</span>)
            </div>
            <div id="fileList"></div>
        </div>
        
        <!-- 进度 -->
        <div class="progress-area hidden" id="progressArea">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">准备上传...</div>
        </div>
        
        <!-- 状态 -->
        <div class="status hidden" id="statusArea"></div>
    </div>

    <script>
        // 配置
        const API_URL = 'http://localhost:8000/api/upload';
        const TARGET_FOLDER = './uploads';
        
        // DOM 元素
        const uploadZone = document.getElementById('uploadZone');
        const folderInput = document.getElementById('folderInput');
        const fileInput = document.getElementById('fileInput');
        const fileListArea = document.getElementById('fileListArea');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const totalSize = document.getElementById('totalSize');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const statusArea = document.getElementById('statusArea');
        
        // 存储选中的文件
        let selectedFiles = [];
        
        // 支持的格式
        const SUPPORTED_FORMATS = ['.ogg', '.wav', '.mp3', '.flac', '.m4a', '.ipynb'];
        
        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 检查文件类型
        function isSupported(filename) {
            const ext = '.' + filename.split('.').pop().toLowerCase();
            return SUPPORTED_FORMATS.includes(ext);
        }
        
        // 选择文件夹
        function selectFolder() {
            folderInput.click();
        }
        
        // 选择文件
        function selectFiles() {
            fileInput.click();
        }
        
        // 处理文件选择
        function handleFiles(files) {
            selectedFiles = [];
            
            Array.from(files).forEach(file => {
                if (isSupported(file.name)) {
                    // 添加相对路径信息（文件夹选择时）
                    if (file.webkitRelativePath) {
                        file.relativePath = file.webkitRelativePath;
                    }
                    selectedFiles.push(file);
                }
            });
            
            updateFileList();
        }
        
        // 更新文件列表显示
        function updateFileList() {
            if (selectedFiles.length === 0) {
                fileListArea.classList.add('hidden');
                return;
            }
            
            fileList.innerHTML = '';
            let totalBytes = 0;
            
            selectedFiles.forEach((file, index) => {
                totalBytes += file.size;
                
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-icon">🎵</span>
                    <span class="file-name" title="${file.relativePath || file.name}">
                        ${file.relativePath || file.name}
                    </span>
                    <span class="file-size">${formatSize(file.size)}</span>
                `;
                fileList.appendChild(item);
            });
            
            fileCount.textContent = selectedFiles.length;
            totalSize.textContent = formatSize(totalBytes);
            fileListArea.classList.remove('hidden');
            
            // 自动开始上传
            startUpload();
        }
        
        // 开始上传
        async function startUpload() {
            if (selectedFiles.length === 0) return;
            
            progressArea.classList.remove('hidden');
            statusArea.classList.add('hidden');
            
            const batchSize = 10;
            let uploaded = 0;
            let failed = 0;
            
            for (let i = 0; i < selectedFiles.length; i += batchSize) {
                const batch = selectedFiles.slice(i, i + batchSize);
                
                const formData = new FormData();
                formData.append('target_folder', TARGET_FOLDER);
                formData.append('preserve_structure', 'true');
                
                batch.forEach(file => {
                    const path = file.relativePath || file.name;
                    formData.append('files', file, path);
                });
                
                try {
                    const response = await fetch(`${API_URL}/upload/files`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        uploaded += batch.length;
                    } else {
                        failed += batch.length;
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    failed += batch.length;
                }
                
                // 更新进度
                const percent = ((i + batchSize) / selectedFiles.length * 100);
                progressFill.style.width = Math.min(percent, 100) + '%';
                progressText.textContent = `上传中... ${uploaded}/${selectedFiles.length}`;
            }
            
            progressFill.style.width = '100%';
            progressText.textContent = `上传完成: ${uploaded} 成功, ${failed} 失败`;
            
            // 显示状态
            statusArea.classList.remove('hidden');
            if (failed === 0) {
                statusArea.className = 'status status-success';
                statusArea.textContent = `✅ 全部上传成功！共 ${uploaded} 个文件`;
            } else {
                statusArea.className = 'status status-error';
                statusArea.textContent = `⚠️ 上传完成: ${uploaded} 成功, ${failed} 失败`;
            }
        }
        
        // 事件监听 - 文件夹选择
        folderInput.addEventListener('change', (e) => {
            console.log('Folder selected:', e.target.files.length, 'files');
            handleFiles(e.target.files);
        });
        
        // 事件监听 - 文件选择
        fileInput.addEventListener('change', (e) => {
            console.log('Files selected:', e.target.files.length, 'files');
            handleFiles(e.target.files);
        });
        
        // 拖拽上传
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            
            const droppedFiles = [];
            
            // 处理拖拽的文件/文件夹
            const traverse = (item, path = '') => {
                if (item.isFile) {
                    item.file(file => {
                        file.relativePath = path + file.name;
                        droppedFiles.push(file);
                    });
                } else if (item.isDirectory) {
                    const reader = item.createReader();
                    reader.readEntries(entries => {
                        entries.forEach(entry => {
                            traverse(entry, path + item.name + '/');
                        });
                    });
                }
            };
            
            const items = e.dataTransfer.items;
            for (let i = 0; i < items.length; i++) {
                const item = items[i].webkitGetAsEntry();
                if (item) traverse(item);
            }
            
            // 延迟处理等待文件收集
            setTimeout(() => {
                if (droppedFiles.length > 0) {
                    handleFiles(droppedFiles);
                }
            }, 100);
        });
        
        // 点击上传区域
        uploadZone.addEventListener('click', (e) => {
            // 如果点击的是按钮，不触发区域点击
            if (e.target.tagName === 'BUTTON') return;
            selectFolder();
        });
        
        console.log('Folder upload component loaded');
        console.log('Browser supports webkitdirectory:', 'webkitdirectory' in document.createElement('input'));
    </script>
</body>
</html>
