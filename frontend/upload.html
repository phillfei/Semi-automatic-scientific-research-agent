<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件夹上传 - EvoAgentX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .upload-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }
        
        .file-input {
            display: none;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .options {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .option-row {
            display: flex;
            align-items: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .option-row label {
            min-width: 120px;
            color: #555;
            font-weight: 500;
        }
        
        .option-row input[type="text"],
        .option-row input[type="number"],
        .option-row select {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .option-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }
        
        .file-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .file-list h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-count {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        
        .file-item:hover {
            background: #f8f9ff;
        }
        
        .file-icon {
            font-size: 24px;
            margin-right: 12px;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-path {
            font-size: 0.85em;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-size {
            color: #666;
            font-size: 0.9em;
            margin-right: 15px;
        }
        
        .file-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-uploading {
            background: #cce5ff;
            color: #004085;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .upload-actions {
            margin-top: 20px;
            text-align: center;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .log-container {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85em;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #eee;
        }
        
        .log-time {
            color: #999;
            margin-right: 10px;
        }
        
        .log-info { color: #667eea; }
        .log-success { color: #28a745; }
        .log-error { color: #dc3545; }
        .log-warning { color: #ffc107; }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 文件夹上传</h1>
            <p>支持批量上传音频文件和文件夹，自动扫描子目录</p>
        </div>
        
        <div class="upload-card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📂</div>
                <div class="upload-text">
                    拖拽文件夹到此处，或点击选择
                </div>
                <div class="upload-hint">
                    支持 .ogg, .wav, .mp3, .flac, .ipynb 格式 | 支持批量选择和文件夹上传
                </div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="selectFolder()">
                        📁 选择文件夹
                    </button>
                    <button class="btn btn-secondary" onclick="selectFiles()">
                        📄 选择文件
                    </button>
                </div>
                
                <!-- 文件夹选择输入 -->
                <input type="file" id="folderInput" class="file-input" webkitdirectory directory multiple>
                <!-- 文件选择输入 -->
                <input type="file" id="fileInput" class="file-input" multiple accept=".ogg,.wav,.mp3,.flac,.m4a,.ipynb">
            </div>
            
            <div class="options">
                <h3 style="margin-bottom: 15px; color: #333;">上传选项</h3>
                
                <div class="option-row">
                    <label>目标路径:</label>
                    <input type="text" id="targetFolder" value="./uploads" placeholder="例如: ./data/audio">
                </div>
                
                <div class="option-row">
                    <label>API 地址:</label>
                    <input type="text" id="apiUrl" value="http://localhost:8000/api/upload" placeholder="API 地址">
                </div>
                
                <div class="option-row">
                    <label>文件过滤:</label>
                    <select id="fileFilter">
                        <option value="*">全部音频文件</option>
                        <option value=".ogg">仅 OGG 文件</option>
                        <option value=".wav">仅 WAV 文件</option>
                        <option value=".mp3">仅 MP3 文件</option>
                    </select>
                </div>
                
                <div class="option-row">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="preserveStructure" checked>
                        保留目录结构
                    </label>
                </div>
                
                <div class="option-row">
                    <label style="display: flex; align-items: center;">
                        <input type="checkbox" id="verifyChecksum">
                        验证文件完整性 (MD5)
                    </label>
                </div>
            </div>
            
            <div class="stats" id="statsArea" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="totalFiles">0</div>
                    <div class="stat-label">文件总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalSize">0 MB</div>
                    <div class="stat-label">总大小</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uploadedFiles">0</div>
                    <div class="stat-label">已上传</div>
                </div>
            </div>
            
            <div class="file-list hidden" id="fileListArea">
                <h3>
                    文件列表
                    <span class="file-count" id="fileCount">0</span>
                </h3>
                <div id="fileList"></div>
            </div>
            
            <div class="progress-bar hidden" id="progressBar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="upload-actions" id="uploadActions" style="display: none;">
                <button class="btn btn-primary" onclick="startUpload()">
                    🚀 开始上传
                </button>
                <button class="btn btn-secondary" onclick="clearFiles()">
                    ❌ 清空列表
                </button>
            </div>
            
            <div class="log-container hidden" id="logContainer">
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let selectedFiles = [];
        let isUploading = false;
        
        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const folderInput = document.getElementById('folderInput');
        const fileInput = document.getElementById('fileInput');
        const fileListArea = document.getElementById('fileListArea');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const uploadActions = document.getElementById('uploadActions');
        const statsArea = document.getElementById('statsArea');
        const logContainer = document.getElementById('logContainer');
        
        // 支持的音频格式
        const SUPPORTED_FORMATS = ['.ogg', '.wav', '.mp3', '.flac', '.m4a', '.webm', '.ipynb'];
        
        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'ogg': '🎵',
                'wav': '🔊',
                'mp3': '🎧',
                'flac': '💿',
                'm4a': '📱'
            };
            return icons[ext] || '📄';
        }
        
        // 添加日志
        function addLog(message, type = 'info') {
            const logContent = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${message}</span>`;
            logContent.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            logContainer.classList.remove('hidden');
        }
        
        // 选择文件夹
        function selectFolder() {
            folderInput.click();
        }
        
        // 选择文件
        function selectFiles() {
            fileInput.click();
        }
        
        // 处理文件选择
        function handleFileSelect(files) {
            const filter = document.getElementById('fileFilter').value;
            
            Array.from(files).forEach(file => {
                // 检查文件类型
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                
                if (filter !== '*' && ext !== filter) {
                    return;
                }
                
                if (!SUPPORTED_FORMATS.includes(ext)) {
                    return;
                }
                
                // 检查是否已存在
                const exists = selectedFiles.some(f => 
                    f.name === file.name && f.size === file.size
                );
                
                if (!exists) {
                    selectedFiles.push(file);
                }
            });
            
            updateFileList();
        }
        
        // 更新文件列表显示
        function updateFileList() {
            fileList.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-icon">${getFileIcon(file.name)}</div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-path">${file.webkitRelativePath || '根目录'}</div>
                    </div>
                    <div class="file-size">${formatSize(file.size)}</div>
                    <div class="file-status status-pending" id="status-${index}">待上传</div>
                `;
                fileList.appendChild(item);
            });
            
            fileCount.textContent = selectedFiles.length;
            
            // 更新统计
            const totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);
            document.getElementById('totalFiles').textContent = selectedFiles.length;
            document.getElementById('totalSize').textContent = formatSize(totalSize);
            
            // 显示区域
            if (selectedFiles.length > 0) {
                fileListArea.classList.remove('hidden');
                uploadActions.style.display = 'block';
                statsArea.style.display = 'grid';
            }
        }
        
        // 清空文件
        function clearFiles() {
            selectedFiles = [];
            fileListArea.classList.add('hidden');
            uploadActions.style.display = 'none';
            statsArea.style.display = 'none';
            document.getElementById('progressBar').classList.add('hidden');
            logContainer.classList.add('hidden');
            addLog('已清空文件列表', 'info');
        }
        
        // 开始上传
        async function startUpload() {
            if (isUploading || selectedFiles.length === 0) return;
            
            isUploading = true;
            const targetFolder = document.getElementById('targetFolder').value;
            const apiUrl = document.getElementById('apiUrl').value;
            const preserveStructure = document.getElementById('preserveStructure').checked;
            
            addLog(`开始上传 ${selectedFiles.length} 个文件到 ${targetFolder}`, 'info');
            
            let uploaded = 0;
            let failed = 0;
            
            // 显示进度条
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.classList.remove('hidden');
            
            // 分批上传（每批 10 个文件）
            const batchSize = 10;
            
            for (let i = 0; i < selectedFiles.length; i += batchSize) {
                const batch = selectedFiles.slice(i, i + batchSize);
                
                const formData = new FormData();
                formData.append('target_folder', targetFolder);
                formData.append('preserve_structure', preserveStructure);
                
                batch.forEach(file => {
                    // 保留路径信息
                    const path = preserveStructure ? (file.webkitRelativePath || file.name) : file.name;
                    formData.append('files', file, path);
                });
                
                try {
                    const response = await fetch(`${apiUrl}/upload/files`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        uploaded += result.uploaded_files || batch.length;
                        addLog(`批次 ${Math.floor(i/batchSize) + 1}: 上传成功 ${result.uploaded_files} 个文件`, 'success');
                        
                        // 更新状态
                        for (let j = i; j < Math.min(i + batchSize, selectedFiles.length); j++) {
                            const statusEl = document.getElementById(`status-${j}`);
                            if (statusEl) {
                                statusEl.textContent = '已上传';
                                statusEl.className = 'file-status status-success';
                            }
                        }
                    } else {
                        throw new Error(result.message || '上传失败');
                    }
                } catch (error) {
                    failed += batch.length;
                    addLog(`批次 ${Math.floor(i/batchSize) + 1} 失败: ${error.message}`, 'error');
                    
                    for (let j = i; j < Math.min(i + batchSize, selectedFiles.length); j++) {
                        const statusEl = document.getElementById(`status-${j}`);
                        if (statusEl) {
                            statusEl.textContent = '失败';
                            statusEl.className = 'file-status status-error';
                        }
                    }
                }
                
                // 更新进度
                const progress = ((i + batchSize) / selectedFiles.length) * 100;
                progressFill.style.width = Math.min(progress, 100) + '%';
                document.getElementById('uploadedFiles').textContent = uploaded;
            }
            
            isUploading = false;
            addLog(`上传完成: ${uploaded} 成功, ${failed} 失败`, uploaded === selectedFiles.length ? 'success' : 'warning');
            
            // 完成提示
            if (uploaded === selectedFiles.length) {
                alert(`✅ 全部上传成功！共 ${uploaded} 个文件`);
            } else {
                alert(`⚠️ 上传完成: ${uploaded} 成功, ${failed} 失败`);
            }
        }
        
        // 事件监听
        folderInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files);
            addLog(`选择了文件夹，包含 ${e.target.files.length} 个文件`, 'info');
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files);
            addLog(`选择了 ${e.target.files.length} 个文件`, 'info');
        });
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const items = e.dataTransfer.items;
            const files = [];
            
            const traverseFileTree = (item, path = '') => {
                if (item.isFile) {
                    item.file(file => {
                        file.webkitRelativePath = path + file.name;
                        files.push(file);
                    });
                } else if (item.isDirectory) {
                    const dirReader = item.createReader();
                    dirReader.readEntries(entries => {
                        entries.forEach(entry => {
                            traverseFileTree(entry, path + item.name + '/');
                        });
                    });
                }
            };
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i].webkitGetAsEntry();
                if (item) {
                    traverseFileTree(item);
                }
            }
            
            // 延迟处理，等待文件收集完成
            setTimeout(() => {
                if (files.length > 0) {
                    handleFileSelect(files);
                    addLog(`拖放了 ${files.length} 个文件`, 'info');
                }
            }, 100);
        });
        
        // 初始化
        addLog('文件夹上传页面已加载', 'info');
        addLog('支持的格式: ' + SUPPORTED_FORMATS.join(', '), 'info');
    </script>
</body>
</html>
